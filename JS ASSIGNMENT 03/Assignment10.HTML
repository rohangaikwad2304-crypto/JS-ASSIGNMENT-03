<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reverser</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fdfdfd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #ff4757;
        }

        .arrow {
            font-size: 24px;
            color: #ccc;
            margin: 15px 0;
        }

        .output-box {
            background: #fff5f6;
            padding: 15px;
            border-radius: 10px;
            min-height: 30px;
            font-size: 1.3rem;
            color: #ff4757;
            font-weight: bold;
            word-wrap: break-word;
        }

        .label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>String Reverser</h2>

        <div class="label">Type Here</div>
        <input type="text" id="userInput" placeholder="Type 'Hello'..." autocomplete="off">

        <div class="arrow">↓</div>

        <div class="label">Reversed Result</div>
        <div id="result" class="output-box"></div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const resultDisplay = document.getElementById('result');

        input.addEventListener('input', () => {
            const text = input.value;
            // Logic: Split, Reverse, Join
            const reversed = text.split('').reverse().join('');
            resultDisplay.textContent = reversed;
        });
    </script>

</body>

</html>
