<!DOCTYPE html>
<html>

<head>
    <title>Student Average</title>
    <style>
        body {
            font-family: Popinces, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 60px;
        }

        .container {
            background: #ffffff;
            width: 420px;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        pre {
            text-align: left;
            background: #eee;
            padding: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Student Average Calculator</h2>
        <button onclick="calculate()">Calculate Average</button>
        <pre id="output"></pre>
    </div>

    <script>
        function calculate() {

            const students = [
                {
                    name: "student1",
                    subject1: 44,
                    subject2: 56,
                    subject3: 87,
                    subject4: 97,
                    subject5: 37
                },
                {
                    name: "student2",
                    subject1: 44,
                    subject2: 56,
                    subject3: 87,
                    subject4: 97,
                    subject5: 37
                },
                {
                    name: "student3",
                    subject1: 44,
                    subject2: 56,
                    subject3: 87,
                    subject4: 97,
                    subject5: 37
                }
            ];

            const result = students.map(student => {

                const marks = Object.values(student).slice(1); // remove name

                const total = marks.reduce((sum, mark) => sum + mark, 0);

                const average = Math.floor(total / marks.length);

                return {
                    [student.name]: {
                        average: average
                    }
                };
            });

            document.getElementById("output").textContent =
                JSON.stringify(result, null, 2);
        }
    </script>

</body>

</html>
